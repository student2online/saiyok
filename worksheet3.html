<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังความรู้</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f5f5f5; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="myIframe" src=""></iframe>

    <script>
        const GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbx9kC4l0zBOAeODEnd9A46D8rAbaedn56tZJ8tf_-IN9NhsypFqV9qOEfdpwRIvDDGnbQ/exec";
        
        // 1. ดึง Query Parameter จาก URL ของ GitHub (เช่น ?p=วิทยาศาสตร์)
        const urlParams = new URLSearchParams(window.location.search);
        let sheetName = urlParams.get('p') || 'worksheet1'; 

        // 2. แปลงชื่อภาษาไทยให้เป็นรูปแบบที่ URL ปลอดภัย (Encode)
        // เช่น "วิทยาศาสตร์" -> "%E0%B8%A7%E0%B8%B4%E0%B8%97..."
        const encodedSheet = encodeURIComponent(sheetName);
        
        // 3. กำหนด src ให้ iframe
        document.getElementById('myIframe').src = GAS_BASE_URL + "?sheet=" + encodedSheet;
    </script>
</body>
</html>
